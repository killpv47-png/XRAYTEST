name: Automated Core Data Synchronization

on:
  workflow_dispatch:

concurrency:
  group: killpv2-core-loop
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  panels_manager:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository Framework
        uses: actions/checkout@v4

      - name: Prepare Local Environments
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests[socks] pyTelegramBotAPI "qrcode[pil]"

      - name: Optimize Network Engine Stack
        run: |
          sudo bash -c 'cat >> /etc/sysctl.conf' <<'EOF'
          net.core.default_qdisc=fq
          net.ipv4.tcp_congestion_control=bbr
          EOF
          sudo sysctl -p || true

          if [ ! -f ./cloudflared ]; then
            curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi

          nohup ./cloudflared tunnel --url http://127.0.0.1:8080 --no-autoupdate > cloudflare_edge.log 2>&1 &
          sleep 5

          for retry in 1 2 3; do
            echo "🔄 Checking Stream Status (Attempt $retry/3)..."
            for i in $(seq 1 20); do
              HOST=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' cloudflare_edge.log | head -n 1 | sed 's#https://##g')
              if [ -n "$HOST" ]; then
                echo "🎯 Sync Pipeline Active Configuration"
                echo "$HOST" > active_edge_host.txt
                break 2
              fi
              sleep 2
            done
            if [ "$retry" -lt 3 ]; then
              echo "🔄 Restarting tunnel..."
              pkill -f "cloudflared tunnel --url http://127.0.0.1:8080" || true
              sleep 2
              nohup ./cloudflared tunnel --url http://127.0.0.1:8080 --no-autoupdate > cloudflare_edge.log 2>&1 &
              sleep 5
            fi
          done

          if [ ! -f active_edge_host.txt ]; then
            echo "🚨 Data Stream Pipeline Interrupted."
            cat cloudflare_edge.log || true
            exit 1
          fi
          echo "✅ Connected! Domain: $(cat active_edge_host.txt)"

      - name: Launch Operational Backend Microservice
        env:
          SUB_REPO_TOKEN: ${{ secrets.GH_PAT2 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python3 -u analytics_worker.py

      - name: Commit and Save State to Repository
        if: always()
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add killpv2_state.json active_edge_host.txt active_runner_host.txt || true
          git commit -m "🔄 Save panel state before rotation [skip ci]" || true
          git push || true

      - name: Trigger Successive Pipeline Execution Loop
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run data-sync.yml --ref main
          echo "⛓️ Next encryption cycle synchronized."
